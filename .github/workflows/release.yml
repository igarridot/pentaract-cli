name: Release

permissions:
  contents: read

on:
  push:
    branches:
      - master

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Create Tag And Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute next semantic version
        id: version
        run: |
          set -euo pipefail

          semver_regex='^v[0-9]+\.[0-9]+\.[0-9]+$'

          existing_tag="$(git tag --points-at HEAD | grep -E "${semver_regex}" | sort -V | tail -n1 || true)"
          if [ -n "${existing_tag}" ]; then
            echo "tag=${existing_tag}" >> "${GITHUB_OUTPUT}"
            echo "created=false" >> "${GITHUB_OUTPUT}"
            echo "Tag already exists on HEAD: ${existing_tag}"
            exit 0
          fi

          latest_tag="$(git tag -l 'v*' | grep -E "${semver_regex}" | sort -V | tail -n1 || true)"
          if [ -z "${latest_tag}" ]; then
            next_tag="v0.0.1"
          else
            version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "${version}"
            next_patch=$((patch + 1))
            next_tag="v${major}.${minor}.${next_patch}"
          fi

          echo "tag=${next_tag}" >> "${GITHUB_OUTPUT}"
          echo "created=true" >> "${GITHUB_OUTPUT}"
          echo "Next tag: ${next_tag}"

      - name: Create and push tag
        if: steps.version.outputs.created == 'true'
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${tag}" -m "Release ${tag}"
          git push origin "${tag}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true

  docker-publish:
    name: Build And Push To Docker Hub
    runs-on: ubuntu-latest
    needs:
      - release

    steps:
      - name: Checkout release commit
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.release.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            norbega/pentaract-cli:${{ needs.release.outputs.tag }}
            norbega/pentaract-cli:latest
